targets:
  $default:
    sources:
      include:
        - $package$
        - lib/**
        - test/**
        - integration_test/**
      exclude:
        - "**/*.g.dart"
        - "**/*.freezed.dart"

    builders:
      riverpod_generator:
        generate_for:
          include:
            - lib/**.dart

      freezed:
        generate_for:
          include:
            - lib/**.dart
        options:
          copy_with: true
          equal: true
          format: true
          from_json: true
          generic_argument_factories: true
          map: true
          maybe_map: true
          maybe_when: true
          to_json: true
          union_key: type
          union_value_case: snake
          when: true

      json_serializable:
        generate_for:
          include:
            - lib/**.dart
        options:
          any_map: false
          checked: true
          create_factory: true
          create_to_json: true
          disallow_unrecognized_keys: true
          explicit_to_json: true
          field_rename: snake
          generic_argument_factories: true
          include_if_null: false

global_options:
  source_gen:combining_builder:
    options:
      ignore_for_file:
        - type=lint
