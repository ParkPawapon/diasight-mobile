name: commit-type

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title and commit subjects
        env:
          GH_TOKEN: ${{ github.token }}
          TYPE_REGEX: '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([A-Za-z0-9._/-]+\))?!?: .+'
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "Commit type validation runs on pull requests."
            exit 0
          fi

          pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
          pr_title="$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")"

          failures=0

          if [[ ! "$pr_title" =~ $TYPE_REGEX ]]; then
            echo "::error title=Invalid PR title::Use a Conventional Commit type, for example 'feat: add onboarding'."
            echo "Invalid PR title: $pr_title"
            failures=1
          fi

          page=1
          while :; do
            response="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/commits?per_page=100&page=${page}")"

            count="$(jq 'length' <<<"$response")"
            if [[ "$count" -eq 0 ]]; then
              break
            fi

            while IFS=$'\t' read -r sha subject; do
              if [[ ! "$subject" =~ $TYPE_REGEX ]]; then
                echo "::error title=Invalid commit subject::${sha:0:7} must start with a Conventional Commit type."
                echo "Invalid commit ${sha:0:7}: $subject"
                failures=1
              fi
            done < <(jq -r '.[] | [.sha, (.commit.message | split("\n")[0])] | @tsv' <<<"$response")

            page=$((page + 1))
          done

          if [[ "$failures" -ne 0 ]]; then
            exit 1
          fi
