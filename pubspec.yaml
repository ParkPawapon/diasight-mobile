name: diasight_app
description: Production Enterprise mobile application for Diasight.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.9"

dependencies:
  collection: ^1.19.1
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 3.1.0
  flutter_secure_storage: ^10.0.0
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logger: ^2.7.0
  mix: ^2.0.2
  riverpod_annotation: 4.0.0
  tailwind_colors: ^0.3.1

dev_dependencies:
  build_runner: ^2.15.0
  custom_lint: ^0.8.1
  flutter_test:
    sdk: flutter
  freezed: 3.2.3
  integration_test:
    sdk: flutter
  json_serializable: 6.11.2
  mocktail: ^1.0.5
  riverpod_generator: 4.0.0+1
  riverpod_lint: 3.1.0
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/env/
    - assets/certificates/
    - assets/icons/
    - assets/images/
    - assets/images/onboardings/onboarding.png
    - assets/lottie/

  fonts:
    - family: Kanit
      fonts:
        - asset: assets/fonts/kanit/Kanit-Regular.ttf
          weight: 400
        - asset: assets/fonts/kanit/Kanit-Medium.ttf
          weight: 500
        - asset: assets/fonts/kanit/Kanit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/kanit/Kanit-Bold.ttf
          weight: 700
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat/Montserrat[wght].ttf
        - asset: assets/fonts/montserrat/Montserrat-Italic[wght].ttf
          style: italic
